baseURL: "/"
languageCode: "zh-cn"
title: "伊来尔去"
theme: "PaperMod"
pagination:
  pagerSize: 10
defaultContentLanguage: "zh"
ignoreLogs: ["warning-goldmark-raw-html"]

params:
  description: "伊来尔去的个人技术博客，记录编程、系统设计与技术思考"
  author: "伊来尔去"
  dateFormat: "2006-01-02"

  homeInfoParams:
    Title: "伊来尔去"
    Content: "软件开发者，热爱技术与写作。在这里记录编程实践、系统设计思考与AI探索。"

  socialIcons:
    - name: "github"
      url: "https://github.com/pcell888"
    - name: "rss"
      url: "index.xml"

  cover:
    linkFullImages: true
  ShowToc: true
  TocOpen: false
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  showFullTextviewInRSS: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: "posts"
      name: "文章"
      url: "/posts/"
      weight: 10
    - identifier: "tags"
      name: "标签"
      url: "/tags/"
      weight: 20
    - identifier: "search"
      name: "搜索"
      url: "/search/"
      weight: 25
    - identifier: "about"
      name: "关于"
      url: "/about/"
      weight: 30

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    lineNos: true
    lineNumbersInTable: false

outputs:
  home: ["HTML", "RSS", "JSON"]
  section: ["HTML", "RSS"]
